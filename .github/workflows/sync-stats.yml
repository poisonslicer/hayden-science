name: Sync stats

# Updates the h-index (Google Scholar) and chess rating (chess.com) once a day,
# commits data/stats.json, and that commit triggers the Pages redeploy.
on:
  schedule:
    - cron: '17 8 * * *'   # ~08:17 UTC daily
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch latest stats
        run: node scripts/sync-stats.mjs
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json
          git diff --quiet --cached || git commit -m "chore: daily stats sync"
          git push
